<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="micro.svita — atlas of unbuilt worlds">
  <title>micro.svita — primary lockup</title>
  <defs>
    <linearGradient id="lp-folio" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F4EFE3"/>
      <stop offset="100%" stop-color="#E8DCC0"/>
    </linearGradient>
    <radialGradient id="lp-wax" cx="38%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#9C8757"/>
      <stop offset="55%"  stop-color="#7A6B3D"/>
      <stop offset="100%" stop-color="#544A29"/>
    </radialGradient>
    <style>
      .display { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-weight: 400; }
      .display-italic { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-weight: 400; font-style: italic; }
      .tagline { font-family: 'Inter Tight', system-ui, sans-serif; font-weight: 500; }
    </style>
  </defs>

  <!-- ── MARK (LEFT) ── -->
  <g transform="translate(10,10)">
    <!-- linen folio -->
    <rect x="14" y="20" width="72" height="60" rx="0.6"
          fill="url(#lp-folio)" stroke="#2F4438" stroke-width="0.6" stroke-opacity="0.85"/>
    <!-- folio fold corner -->
    <path d="M86,20 L86,33 L73,20 Z" fill="#2F4438" fill-opacity="0.06"/>
    <path d="M86,20 L73,20 L86,33 Z" fill="#2F4438" fill-opacity="0.10" stroke="#2F4438" stroke-width="0.4" stroke-opacity="0.4"/>
    <!-- ribbon -->
    <rect x="14" y="48" width="72" height="5.4" fill="#2F4438"/>
    <rect x="48.3" y="20" width="5.4" height="60" fill="#2F4438"/>
    <!-- wax seal -->
    <circle cx="51" cy="51" r="13.4" fill="url(#lp-wax)" stroke="#2F4438" stroke-width="0.55"/>
    <circle cx="51" cy="51" r="9.8"  fill="none" stroke="#F0EADF" stroke-width="0.4" stroke-opacity="0.45"/>
    <ellipse cx="46.5" cy="46.5" rx="3.6" ry="1.8" fill="#F0EADF" fill-opacity="0.18"/>
    <!-- italic monogram -->
    <text x="51" y="58.5" class="display-italic" font-size="19" font-weight="500"
          fill="#F0EADF" text-anchor="middle">m</text>
  </g>

  <!-- ── WORDMARK (RIGHT) ── -->
  <g transform="translate(140,0)">
    <text x="0" y="68" class="display" font-size="48" fill="#2F4438">micro</text>
    <circle cx="143" cy="60" r="2.7" fill="#7A6B3D"/>
    <text x="156" y="68" class="display-italic" font-size="48" fill="#2F4438">svita</text>
    <!-- thin rule -->
    <line x1="0" y1="84" x2="262" y2="84" stroke="#2F4438" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="0" y="100" class="tagline" font-size="9.4" letter-spacing="2.4" fill="#5F6870">
      ATLAS · OF · UNBUILT · WORLDS
    </text>
  </g>
</svg>
