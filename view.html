<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SVITA Micro — Concept Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-1:#FFC8DD;
  --bg-2:#B4E33D;
  --accent:#FF006E;
  --ink:#0F172A;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:var(--ink);overflow:hidden}
body{
  background:
    radial-gradient(ellipse at top left,var(--bg-1) 0%,transparent 55%),
    radial-gradient(ellipse at bottom right,var(--bg-2) 0%,transparent 55%),
    #FFFBF0;
  transition:background 800ms var(--ease);
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:var(--pattern,none);
  background-size:var(--pattern-size,240px);
  opacity:var(--pattern-opacity,0.18);
  z-index:0;
  animation:drift 30s linear infinite;
}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-240px)}}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:20px 28px;display:flex;align-items:center;justify-content:space-between;
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-family:'Space Grotesk';font-weight:700;font-size:16px;
  background:rgba(10,10,11,0.85);color:#fff;
  padding:10px 18px;border-radius:100px;backdrop-filter:blur(12px);
  text-decoration:none;
}
.brand-dot{width:8px;height:8px;border-radius:50%;background:#D6FF3E}
.concept-chip{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);
  padding:10px 18px;border-radius:100px;
  font-size:13px;font-weight:500;color:var(--ink);
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.concept-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.lang-chip{position:relative}
.lang-btn{
  background:rgba(10,10,11,0.85);color:#fff;border:none;cursor:pointer;
  padding:10px 14px;border-radius:100px;font-family:'Space Grotesk';font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px);
}
.lang-btn svg{opacity:0.6}
.lang-menu{
  position:absolute;top:calc(100% + 8px);right:0;min-width:140px;
  background:rgba(17,17,19,0.96);border:1px solid rgba(255,255,255,0.1);border-radius:14px;
  padding:6px;display:none;backdrop-filter:blur(18px);z-index:200;
  max-height:320px;overflow-y:auto;
}
.lang-menu.open{display:block}
.lang-menu button{
  display:block;width:100%;text-align:left;background:transparent;border:none;color:#fff;
  padding:9px 14px;border-radius:8px;font-family:'Inter';font-size:13px;cursor:pointer;
}
.lang-menu button:hover{background:rgba(255,255,255,0.08)}
.lang-menu button.active{background:rgba(214,255,62,0.12);color:#D6FF3E}
.concept-chip strong{font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn-close{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.92);color:var(--ink);
  padding:10px 18px;border-radius:100px;font-size:13px;font-weight:500;
  border:1px solid rgba(0,0,0,0.08);text-decoration:none;
  transition:all 200ms var(--ease);
}
.btn-close:hover{background:#fff;transform:translateY(-1px)}
.btn-close svg{width:14px;height:14px}

/* ===== AMBIENT LABELS ===== */
.amb{
  position:fixed;z-index:1;pointer-events:none;
  font-family:'Space Grotesk';font-weight:700;
  color:rgba(15,23,42,0.1);
  text-transform:uppercase;letter-spacing:-0.02em;
}
.amb-tag{
  position:fixed;z-index:2;
  background:rgba(255,255,255,0.82);backdrop-filter:blur(10px);
  padding:8px 16px;border-radius:100px;font-size:11px;font-weight:600;
  color:var(--ink);letter-spacing:0.08em;text-transform:uppercase;
  border:1px solid rgba(0,0,0,0.06);box-shadow:0 4px 14px rgba(0,0,0,0.06);
  animation:fadeUp 900ms var(--ease) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== CENTERED FRAME ===== */
.stage{
  position:fixed;inset:0;z-index:5;
  display:flex;align-items:center;justify-content:center;
  padding:88px 40px 40px;
}
.frame{
  width:100%;max-width:1280px;
  height:100%;max-height:calc(100vh - 128px);
  background:#fff;border-radius:20px;overflow:hidden;
  box-shadow:0 60px 120px rgba(15,23,42,0.28),0 20px 60px rgba(15,23,42,0.14),0 0 0 1px rgba(255,255,255,0.6);
  animation:pop 700ms var(--ease) 100ms both;
  position:relative;
}
@keyframes pop{from{opacity:0;transform:scale(0.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.frame iframe{width:100%;height:100%;border:0;display:block;background:#fff}

/* ===== PREVIEW MODE (no brandbook yet) ===== */
.preview-body{
  display:flex;flex-direction:column;height:100%;overflow-y:auto;
  background:linear-gradient(180deg,#fff 0%,#FAFAFA 100%);
}
.preview-hero{
  position:relative;aspect-ratio:16/9;width:100%;
  background:linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 100%);
  display:flex;align-items:flex-end;padding:40px;
}
.preview-hero .glyph{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:220px;opacity:0.18;font-family:'Space Grotesk';font-weight:700;
}
.preview-hero .meta{
  position:relative;z-index:2;display:flex;flex-direction:column;gap:10px;color:#fff;
  text-shadow:0 2px 20px rgba(0,0,0,0.2);
}
.preview-hero h1{
  font-family:'Space Grotesk';font-size:clamp(2rem,4vw,3.5rem);font-weight:700;
  letter-spacing:-0.03em;line-height:1;
}
.preview-hero .tag{font-size:14px;opacity:0.9;font-weight:500}
.preview-body-inner{padding:40px;display:grid;grid-template-columns:2fr 1fr;gap:32px}
@media(max-width:760px){.preview-body-inner{grid-template-columns:1fr}}
.preview-body-inner h2{font-family:'Space Grotesk';font-size:22px;margin-bottom:12px}
.preview-body-inner p{color:#475569;font-size:15px;line-height:1.6;margin-bottom:16px}
.specs{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:16px;padding:24px;height:fit-content}
.specs .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed #E2E8F0;font-size:13px}
.specs .row:last-child{border:0}
.specs .row .k{color:#94A3B8;text-transform:uppercase;letter-spacing:0.08em;font-size:11px;font-weight:600}
.specs .row .v{font-weight:600;color:var(--ink)}
.specs .price{font-family:'Space Grotesk';font-size:42px;font-weight:700;color:var(--accent);margin-bottom:8px}
.specs .btn{
  display:flex;justify-content:center;align-items:center;gap:8px;
  width:100%;padding:14px;border-radius:100px;
  background:var(--ink);color:#fff;font-weight:600;font-size:14px;
  border:0;cursor:pointer;margin-top:20px;transition:all 200ms var(--ease);
  text-decoration:none;
}
.specs .btn:hover{background:var(--accent);transform:translateY(-1px)}
.lock-note{
  margin-top:16px;padding:14px 18px;background:rgba(255,255,255,0.7);
  border-radius:12px;font-size:12px;color:#64748B;text-align:center;
  border:1px dashed #CBD5E1;
}

/* ===== LOADING ===== */
.loading{
  position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(255,251,240,0.9);backdrop-filter:blur(6px);
}
.loading .spinner{
  width:40px;height:40px;border:3px solid rgba(15,23,42,0.1);border-top-color:var(--accent);
  border-radius:50%;animation:spin 900ms linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

@media(max-width:768px){
  .stage{padding:76px 16px 16px}
  .amb-tag{display:none}
}
</style>
</head>

let CONCEPT = null;
let CURRENT_LANG = localStorage.getItem('svita_micro_lang') || 'en';
let I18N_ROW = null; // row from concepts_i18n
let IS_SA = false;   // superadmin flag
const SB_URL = 'https://ctdleobjnzniqkqomlrq.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0ZGxlb2JqbnpuaXFrcW9tbHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzE4MTEsImV4cCI6MjA4NzgwNzgxMX0.AMHtY7zGPemKYCxMy2bqRTOEAp8trA_Slor9wmg7C38';
const SB = window.supabase ? window.supabase.createClient(SB_URL, SB_KEY) : null;

function escape(s){
  return String(s==null?'':s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

async function saVerify(slug){
  if(!SB) return;
  if(!confirm('Verify concept '+slug+'?')) return;
  const {error} = await SB.from('concepts_catalog').update({verified:true, verified_at:new Date().toISOString()}).eq('slug', slug);
  if(error){ alert('Error: '+error.message); return; }
  alert('Verified ✓');
}
window.saVerify = saVerify;

async function detectSuperadmin(){
  if(!SB) return false;
  try{
    const {data:{session}} = await SB.auth.getSession();
    if(!session) return false;
    const {data} = await SB.from('profiles').select('role').eq('user_id', session.user.id).maybeSingle();
    return data && data.role === 'superadmin';
  }catch(e){ return false; }
}

(async function init(){
  const params = new URLSearchParams(location.search);
  const slug = params.get('c') || params.get('slug') || 'poppy-matcha';
  const urlLang = params.get('lang');
  if(urlLang && LANGS.some(l=>l.c===urlLang)) CURRENT_LANG = urlLang;

  let concept = null;
  try{
    const res = await fetch('data/catalog.json',{cache:'no-cache'});
    if(res.ok){
      const catalog = await res.json();
      concept = catalog.find(c=>c.slug===slug);
    }
  }catch(e){}

  if(!concept && slug==='poppy-matcha'){
    concept = {
      slug:'poppy-matcha', name:'POPPY MATCHA', category:'food', country:'NL',
      size_m2:8, price_eur:49, budget_eur:11850, weeks:7,
      hero_image:'data/concepts/poppy-matcha/images/01-hero-interior.png',
      tagline:'Ceremonial-grade matcha kiosk with Memphis soul.'
    };
  }
  if(!concept){
    document.getElementById('frame').innerHTML = '<div style="padding:60px;text-align:center;font-family:Inter"><h2 style="font-family:Space Grotesk;margin-bottom:12px">Concept not found</h2><p style="color:#64748B">Slug: '+slug+'</p><a href="index.html" style="display:inline-block;margin-top:20px;padding:12px 24px;background:#0F172A;color:#fff;border-radius:100px;text-decoration:none">Back to shop</a></div>';
    document.getElementById('loading').classList.add('hidden');
    return;
  }

  CONCEPT = concept;
  applyTheme(concept);
  buildLangMenu();
  IS_SA = await detectSuperadmin();
  if(IS_SA){ document.body.classList.add('sa-mode'); }
  await loadI18nOverride(slug, CURRENT_LANG);
  rerenderAll();
  document.getElementById('loading').classList.add('hidden');
})();

async function loadI18nOverride(slug, lang){
  I18N_ROW = null;
  // Try Supabase (if available)
  try{
    const url = `https://ctdleobjnzniqkqomlrq.supabase.co/rest/v1/concepts_i18n?concept_slug=eq.${encodeURIComponent(slug)}&lang_code=eq.${lang}&select=*`;
    const res = await fetch(url, {
      headers:{
        apikey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0ZGxlb2JqbnpuaXFrcW9tbHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzE4MTEsImV4cCI6MjA4NzgwNzgxMX0.AMHtY7zGPemKYCxMy2bqRTOEAp8trA_Slor9wmg7C38'
      }
    });
    if(res.ok){
      const rows = await res.json();
      if(rows && rows.length) I18N_ROW = rows[0];
    }
  }catch(e){}
}

function t(key, ...args){
  const bundle = UI_STRINGS[CURRENT_LANG] || UI_STRINGS.en;
  const v = bundle[key];
  return typeof v === 'function' ? v(...args) : v;
}

function localizedConcept(){
  const c = {...CONCEPT};
  if(I18N_ROW){
    if(I18N_ROW.name) c.name = I18N_ROW.name;
    if(I18N_ROW.tagline) c.tagline = I18N_ROW.tagline;
    c._description = I18N_ROW.description;
    c._body_html = I18N_ROW.body_html;
  }
  c._theme = CONCEPT._theme;
  return c;
}

function rerenderAll(){
  const loc = localizedConcept();
  document.documentElement.lang = CURRENT_LANG;
  document.getElementById('langCurrent').textContent = CURRENT_LANG.toUpperCase();
  renderChip(loc);
  document.getElementById('ambient').innerHTML = '';
  renderAmbient(loc);
  renderFrame(loc);
}

function buildLangMenu(){
  const menu = document.getElementById('langMenu');
  menu.innerHTML = LANGS.map(l=>
    `<button data-lang="${l.c}" class="${l.c===CURRENT_LANG?'active':''}">${l.n}</button>`
  ).join('');
  document.getElementById('langBtn').addEventListener('click', e=>{
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', ()=> menu.classList.remove('open'));
  menu.addEventListener('click', async e=>{
    const b = e.target.closest('button[data-lang]');
    if(!b) return;
    CURRENT_LANG = b.dataset.lang;
    localStorage.setItem('svita_micro_lang', CURRENT_LANG);
    menu.classList.remove('open');
    menu.querySelectorAll('button').forEach(x=>x.classList.toggle('active', x.dataset.lang===CURRENT_LANG));
    // update URL without reload
    const u = new URL(location.href); u.searchParams.set('lang', CURRENT_LANG);
    history.replaceState({},'',u);
    await loadI18nOverride(CONCEPT.slug, CURRENT_LANG);
    rerenderAll();
  });
}

function applyTheme(concept){
  const theme = THEMES[concept.slug] || CATEGORY_PALETTES[concept.category] || CATEGORY_PALETTES.food;
  const r = document.documentElement;
  r.style.setProperty('--bg-1',theme.bg1);
  r.style.setProperty('--bg-2',theme.bg2);
  r.style.setProperty('--accent',theme.accent);
  if(theme.pattern){
    r.style.setProperty('--pattern',theme.pattern);
    r.style.setProperty('--pattern-opacity','0.22');
  }
  // stash for downstream
  concept._theme = theme;
}

function renderChip(c){
  document.getElementById('chipText').innerHTML =
    '<strong>'+c.name+'</strong> · '+c.country+' · €'+c.budget_eur.toLocaleString('en-US');
}

function renderAmbient(c){
  const wrap = document.getElementById('ambient');
  const tags = (c._theme.tags || [c.category, c.country, c.size_m2+'m²', '€'+c.budget_eur.toLocaleString()]).slice(0,4);
  const positions = [
    {top:'14%',left:'4%'},
    {top:'76%',left:'6%'},
    {top:'20%',right:'4%'},
    {top:'82%',right:'5%'}
  ];
  tags.forEach((t,i)=>{
    const el = document.createElement('div');
    el.className = 'amb-tag';
    el.style.animationDelay = (i*120+300)+'ms';
    Object.assign(el.style, positions[i]);
    el.textContent = t;
    wrap.appendChild(el);
  });
}

function renderFrame(c){
  const frame = document.getElementById('frame');
  frame.innerHTML = '';
  if(HAS_BRANDBOOK.has(c.slug) && CURRENT_LANG === 'en'){
    const iframe = document.createElement('iframe');
    iframe.src = 'data/concepts/'+c.slug+'/brandbook.html';
    iframe.title = c.name + ' brandbook';
    frame.appendChild(iframe);
    return;
  }
  // Superadmin: unlock view — render body_html if present, otherwise full data dump for review
  const saReview = IS_SA
    ? `<div style="margin-top:24px;padding:16px 20px;border:1px dashed rgba(239,68,68,0.4);border-radius:14px;background:rgba(239,68,68,0.06)">
         <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#ef4444;font-weight:700;margin-bottom:12px">Superadmin review mode</div>
         ${c._body_html ? '<div style="font-size:12px;color:#64748b">Body HTML present — rendered above.</div>'
            : `<div style="font-size:12px;color:#64748b;margin-bottom:10px">No body_html in concepts_i18n. Raw catalog data:</div>
               <pre style="font-size:11px;line-height:1.55;white-space:pre-wrap;word-break:break-word;color:#0F172A;background:#fff;padding:12px;border-radius:8px;border:1px solid rgba(0,0,0,0.08);max-height:320px;overflow:auto">${escape(JSON.stringify({
                 slug:c.slug,name:c.name,tagline:c.tagline,description:c._description,
                 category:c.category,country:c.country,size_m2:c.size_m2,
                 budget_eur:c.budget_eur,price_eur:c.price_eur,weeks:c.weeks
               }, null, 2))}</pre>`}
         <div style="display:flex;gap:8px;margin-top:12px">
           <a href="admin.html#concepts" style="font-size:11px;padding:8px 14px;border-radius:100px;background:#0F172A;color:#fff;text-decoration:none">← Admin</a>
           <button onclick="saVerify('${c.slug}')" style="font-size:11px;padding:8px 14px;border-radius:100px;background:#D6FF3E;color:#0F172A;border:0;cursor:pointer;font-weight:600">✓ Verify this concept</button>
         </div>
       </div>`
    : '';

  // If admin-uploaded body_html exists, use it instead of the locked preview
  const body = c._body_html
    ? `<div class="preview-body-inner" style="grid-template-columns:1fr"><div>${c._body_html}${saReview}</div></div>`
    : `<div class="preview-body-inner">
        <div>
          <h2>${t('inside')}</h2>
          <p>${c._description || t('insideP1')}</p>
          <p>${t('insideP2', c.weeks||8)}</p>
          <h2 style="margin-top:28px">${IS_SA ? 'Review data' : t('locked')}</h2>
          <p>${IS_SA ? 'Full concept data visible below for verification.' : t('lockedP')}</p>
          ${saReview}
        </div>
        <div class="specs">
          <div class="price">€${c.price_eur}</div>
          <div style="font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:20px">${t('once')}</div>
          <div class="row"><span class="k">${t('budget')}</span><span class="v">€${c.budget_eur.toLocaleString('en-US')}</span></div>
          <div class="row"><span class="k">${t('timeline')}</span><span class="v">${c.weeks||8} ${t('weeks')}</span></div>
          <div class="row"><span class="k">${t('size')}</span><span class="v">${c.size_m2||'—'}m²</span></div>
          <div class="row"><span class="k">${t('country')}</span><span class="v">${c.country}</span></div>
          <div class="row"><span class="k">${t('category')}</span><span class="v">${c.category}</span></div>
          <a class="btn" href="account.html?buy=${c.slug}">
            ${t('buy')} €${c.price_eur}
            <svg width="14" height="10" viewBox="0 0 14 10" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 5h12M9 1l4 4-4 4"/></svg>
          </a>
          <div class="lock-note">${t('lockNote')}</div>
        </div>
      </div>`;
  frame.innerHTML = `
    <div class="preview-body">
      <div class="preview-hero">
        <div class="glyph">${c._theme.glyph || ''}</div>
        <div class="meta">
          <div class="tag">${c.category.toUpperCase()} · ${c.country} · ${c.size_m2||''}m²</div>
          <h1>${c.name}</h1>
          <div class="tag">${c.tagline||''}</div>
        </div>
      </div>
      ${body}

}
