<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SVITA Micro — Concept Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="js/svita-ui.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg-1:#FFC8DD;
  --bg-2:#B4E33D;
  --accent:#FF006E;
  --ink:#0F172A;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:var(--ink);overflow:hidden}
body{
  background:
    radial-gradient(ellipse at top left,var(--bg-1) 0%,transparent 55%),
    radial-gradient(ellipse at bottom right,var(--bg-2) 0%,transparent 55%),
    #FFFBF0;
  transition:background 800ms var(--ease);
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:var(--pattern,none);
  background-size:var(--pattern-size,240px);
  opacity:var(--pattern-opacity,0.22);
  animation:drift 30s linear infinite;
}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-240px)}}

/* ===== TOP BAR (self-contained, overlays the stage) ===== */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:20px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-family:'Space Grotesk';font-weight:700;font-size:16px;
  background:rgba(10,10,11,0.85);color:#fff;
  padding:10px 18px;border-radius:100px;backdrop-filter:blur(12px);
  text-decoration:none;
}
.brand-dot{width:8px;height:8px;border-radius:50%;background:#D6FF3E}
.topbar-right{display:flex;align-items:center;gap:12px}
.concept-chip{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);
  padding:10px 18px;border-radius:100px;
  font-size:13px;font-weight:500;color:var(--ink);
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.concept-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.concept-chip strong{font-weight:700}
.lang-chip{position:relative}
.lang-btn{
  background:rgba(10,10,11,0.85);color:#fff;border:none;cursor:pointer;
  padding:10px 14px;border-radius:100px;font-family:'Space Grotesk';font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px);
}
.lang-btn svg{opacity:0.6}
.lang-menu{
  position:absolute;top:calc(100% + 8px);right:0;min-width:160px;
  background:rgba(17,17,19,0.96);border:1px solid rgba(255,255,255,0.1);border-radius:14px;
  padding:6px;display:none;backdrop-filter:blur(18px);z-index:200;
  max-height:360px;overflow-y:auto;
}
.lang-menu.open{display:block}
.lang-menu button{
  display:block;width:100%;text-align:left;background:transparent;border:none;color:#fff;
  padding:9px 14px;border-radius:8px;font-family:'Inter';font-size:13px;cursor:pointer;
}
.lang-menu button:hover{background:rgba(255,255,255,0.08)}
.lang-menu button.active{background:rgba(214,255,62,0.12);color:#D6FF3E}
.btn-close{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.92);color:var(--ink);
  padding:10px 18px;border-radius:100px;font-size:13px;font-weight:500;
  border:1px solid rgba(0,0,0,0.08);text-decoration:none;
  transition:all 200ms var(--ease);
}
.btn-close:hover{background:#fff;transform:translateY(-1px)}
.btn-close svg{width:14px;height:14px}

/* ===== CENTERED FRAME ===== */
.stage{
  position:fixed;inset:0;z-index:5;
  display:flex;align-items:center;justify-content:center;
  padding:88px 40px 40px;
}
.frame{
  width:100%;max-width:1280px;
  height:100%;max-height:calc(100vh - 128px);
  background:#fff;border-radius:20px;overflow:hidden;
  box-shadow:0 60px 120px rgba(15,23,42,0.28),0 20px 60px rgba(15,23,42,0.14),0 0 0 1px rgba(255,255,255,0.6);
  animation:pop 700ms var(--ease) 100ms both;
  position:relative;
}
@keyframes pop{from{opacity:0;transform:scale(0.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.frame iframe{width:100%;height:100%;border:0;display:block;background:#fff}

/* ===== PREVIEW MODE (no brandbook yet) ===== */
.preview-body{
  display:flex;flex-direction:column;height:100%;overflow-y:auto;
  background:linear-gradient(180deg,#fff 0%,#FAFAFA 100%);
}
.preview-hero{
  position:relative;aspect-ratio:16/9;width:100%;
  background:linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 100%);
  display:flex;align-items:flex-end;padding:40px;overflow:hidden;
}
.preview-hero .glyph{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:220px;opacity:0.18;font-family:'Space Grotesk';font-weight:700;
}
.preview-hero .collage{
  position:absolute;inset:0;display:grid;gap:6px;z-index:0;
}
.preview-hero .collage.n1{grid-template-columns:1fr}
.preview-hero .collage.n2{grid-template-columns:1fr 1fr}
.preview-hero .collage.n3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr}
.preview-hero .collage.n3 .tile:first-child{grid-row:span 2}
.preview-hero .collage.n4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.preview-hero .collage .tile{
  background-size:cover;background-position:center;
  filter:saturate(1.05);
}
.preview-hero::after{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,0.55) 100%);
}
.preview-hero .meta{z-index:2}
.preview-hero .meta{
  position:relative;z-index:2;display:flex;flex-direction:column;gap:10px;color:#fff;
  text-shadow:0 2px 20px rgba(0,0,0,0.2);
}
.preview-hero h1{
  font-family:'Space Grotesk';font-size:clamp(2rem,4vw,3.5rem);font-weight:700;
  letter-spacing:-0.03em;line-height:1;
}
.preview-hero .tag{font-size:14px;opacity:0.9;font-weight:500}
.preview-body-inner{padding:40px;display:grid;grid-template-columns:2fr 1fr;gap:32px}
@media(max-width:760px){.preview-body-inner{grid-template-columns:1fr}}
.preview-body-inner h2{font-family:'Space Grotesk';font-size:22px;margin-bottom:12px}
.preview-body-inner p{color:#475569;font-size:15px;line-height:1.6;margin-bottom:16px}
.specs{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:16px;padding:24px;height:fit-content}
.specs .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed #E2E8F0;font-size:13px}
.specs .row:last-child{border:0}
.specs .row .k{color:#94A3B8;text-transform:uppercase;letter-spacing:0.08em;font-size:11px;font-weight:600}
.specs .row .v{font-weight:600;color:var(--ink)}
.specs .price{font-family:'Space Grotesk';font-size:42px;font-weight:700;color:var(--accent);margin-bottom:8px}
.specs .btn{
  display:flex;justify-content:center;align-items:center;gap:8px;
  width:100%;padding:14px;border-radius:100px;
  background:var(--ink);color:#fff;font-weight:600;font-size:14px;
  border:0;cursor:pointer;margin-top:20px;transition:all 200ms var(--ease);
  text-decoration:none;
}
.specs .btn:hover{background:var(--accent);transform:translateY(-1px)}
.lock-note{
  margin-top:16px;padding:14px 18px;background:rgba(255,255,255,0.7);
  border-radius:12px;font-size:12px;color:#64748B;text-align:center;
  border:1px dashed #CBD5E1;
}

/* ===== LOADING ===== */
.loading{
  position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(255,251,240,0.9);backdrop-filter:blur(6px);
}
.loading .spinner{
  width:40px;height:40px;border:3px solid rgba(15,23,42,0.1);border-top-color:var(--accent);
  border-radius:50%;animation:spin 900ms linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

@media(max-width:768px){
  html,body{overflow:auto}
  .topbar{padding:12px 14px;gap:8px;flex-wrap:wrap}
  .brand{padding:8px 14px;font-size:13px}
  .topbar-right{gap:8px}
  .concept-chip{padding:8px 12px;font-size:11px;max-width:60vw}
  .concept-chip #chipText{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lang-btn{padding:8px 10px;font-size:11px}
  .btn-close{padding:8px 12px;font-size:11px}
  .btn-close svg{width:12px;height:12px}
  .stage{position:relative;padding:68px 12px 20px;min-height:100vh;align-items:flex-start}
  .frame{height:auto;max-height:none;min-height:calc(100vh - 120px)}
  .preview-body{height:auto}
  .preview-hero{aspect-ratio:4/3;padding:24px}
  .preview-hero .glyph{font-size:140px}
  .preview-hero h1{font-size:28px}
  .preview-body-inner{padding:24px;gap:20px}
  .preview-body-inner h2{font-size:18px}
  .specs{padding:18px}
  .specs .price{font-size:32px}
}
</style>
</head>

function escape(s){
  return String(s==null?'':s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

async function saVerify(slug){
  if(!SB) return;
  if(!confirm('Verify concept '+slug+'? It will go live on the shop.')) return;
  const {error} = await SB.from('concepts_catalog').update({verified:true, verified_at:new Date().toISOString()}).eq('slug', slug);
  if(error){ alert('Error: '+error.message); return; }
  alert('Verified ✓');
}
async function saUnverify(slug){
  if(!SB) return;
  if(!confirm('Mark '+slug+' as draft (unverified)?')) return;
  const {error} = await SB.from('concepts_catalog').update({verified:false, verified_at:null, verified_by:null}).eq('slug', slug);
  if(error){ alert('Error: '+error.message); return; }
  alert('Marked as draft');
}
window.saVerify = saVerify;
window.saUnverify = saUnverify;

async function detectOwnership(slug){
  if(!SB) return {owned:false, type:null};
  try{
    const {data:{session}} = await SB.auth.getSession();
    if(!session) return {owned:false, type:null};
    const {data, error} = await SB.from('purchases')
      .select('status, provider')
      .eq('user_id', session.user.id)
      .eq('concept_slug', slug)
      .eq('status', 'paid')
      .maybeSingle();
    if(error || !data) return {owned:false, type:null};
    const isGift = data.provider === 'superadmin' || data.provider === 'gift';
    return {owned:true, type: isGift ? 'gift' : 'paid'};
  }catch(e){ return {owned:false, type:null}; }
}

async function detectSuperadmin(){
  if(!SB) return false;
  try{
    const {data:{session}} = await SB.auth.getSession();
    if(!session) return false;
    const {data} = await SB.from('profiles').select('role').eq('user_id', session.user.id).maybeSingle();
    return data && data.role === 'superadmin';
  }catch(e){ return false; }
}

let SA_FULL = null; // full concept catalog row + i18n rows (all langs)
async function loadSuperadminFullConcept(slug){
  if(!SB || !IS_SA) return;
  try{
    const [catalogRes, i18nRes] = await Promise.all([
      SB.from('concepts_catalog').select('*').eq('slug', slug).maybeSingle(),
      SB.from('concepts_i18n').select('*').eq('concept_slug', slug)
    ]);
    SA_FULL = {
      catalog: catalogRes.data || null,
      i18n: i18nRes.data || [],
      catalogError: catalogRes.error ? catalogRes.error.message : null,
      i18nError: i18nRes.error ? i18nRes.error.message : null
    };
  }catch(e){
    SA_FULL = { catalog:null, i18n:[], catalogError:String(e), i18nError:null };
  }
}

}

function t(key, ...args){
  const bundle = UI_STRINGS[CURRENT_LANG] || UI_STRINGS.en;
  const v = bundle[key];
  return typeof v === 'function' ? v(...args) : v;
}

function localizedConcept(){
  const c = {...CONCEPT};
  if(I18N_ROW){
    if(I18N_ROW.name) c.name = I18N_ROW.name;
    if(I18N_ROW.tagline) c.tagline = I18N_ROW.tagline;
    c._description = I18N_ROW.description;
    c._body_html = I18N_ROW.body_html;
  }
  c._theme = CONCEPT._theme;
  return c;
}

function rerenderAll(){
  const loc = localizedConcept();
  document.documentElement.lang = CURRENT_LANG;
  renderChip(loc);
  renderFrame(loc);
}

/* Shared nav hook: shared nav calls window.setLang(code) on language change. */
window.setLang = async function(code){
  const lc = (code || 'en').toLowerCase();
  if(!LANGS.some(l=>l.c===lc)) return;
  CURRENT_LANG = lc;
  localStorage.setItem('svita_micro_lang', lc);
  const u = new URL(location.href); u.searchParams.set('lang', lc);
  history.replaceState({},'',u);
  if(CONCEPT){
    await loadI18nOverride(CONCEPT.slug, lc);
    rerenderAll();
  }
};

function applyTheme(concept){
  const theme = THEMES[concept.slug] || CATEGORY_PALETTES[concept.category] || CATEGORY_PALETTES.food;
  const r = document.documentElement;
  r.style.setProperty('--bg-1',theme.bg1);
  r.style.setProperty('--bg-2',theme.bg2);
  r.style.setProperty('--accent',theme.accent);
  if(theme.pattern){
    r.style.setProperty('--pattern',theme.pattern);
    r.style.setProperty('--pattern-opacity','0.22');
  }
  // stash for downstream
  concept._theme = theme;
}

function renderChip(c){
  document.getElementById('chipText').innerHTML =
    '<strong>'+c.name+'</strong> · €'+c.budget_eur.toLocaleString('en-US');
}

function renderFrame(c){
  const frame = document.getElementById('frame');
  frame.innerHTML = '';
  const canSeeBrandbook = !!c.has_brandbook && CURRENT_LANG === 'en' && (IS_SA || IS_OWNED);
  if(canSeeBrandbook){
    const iframe = document.createElement('iframe');
    iframe.title = c.name + ' brandbook';
    iframe.setAttribute('sandbox','allow-same-origin');
    iframe.srcdoc = '<!doctype html><html><body style="font-family:system-ui;padding:40px;color:#64748b;text-align:center">Loading brandbook…</body></html>';
    frame.appendChild(iframe);
    // Fetch protected HTML via RLS — only rows user has access to are returned.
    SB.from('concept_brandbooks')
      .select('html_content')
      .eq('concept_slug', c.slug)
      .maybeSingle()
      .then(({ data, error })=>{
        if(error || !data || !data.html_content){
          iframe.srcdoc = '<!doctype html><html><body style="font-family:system-ui;padding:40px;color:#dc2626;text-align:center"><h3>Brandbook not available</h3><p>This brandbook has not been uploaded yet or your access was revoked.</p></body></html>';
          return;
        }
        iframe.srcdoc = data.html_content;
      });
    return;
  }
  // Superadmin: full product review — fetch all fields via authed client, render body_html
  const saReview = IS_SA ? renderSuperadminReview(c) : '';
  const unlocked = IS_SA || IS_OWNED;
  const ownBadge = IS_OWNED ? `<div style="display:inline-block;margin-bottom:16px;padding:6px 14px;border-radius:100px;background:#D6FF3E;color:#0F172A;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em">${OWN_TYPE==='gift'?'🎁 Unlocked · Gift':'✓ Unlocked · Lifetime access'}</div>` : '';

  // If admin-uploaded body_html exists, use it instead of the locked preview
  const body = c._body_html
    ? `<div class="preview-body-inner" style="grid-template-columns:1fr"><div>${ownBadge}${c._body_html}${saReview}</div></div>`
    : unlocked
      ? `<div class="preview-body-inner" style="grid-template-columns:1fr"><div>${ownBadge}
          <h2>${t('inside')}</h2>
          <p>${c._description || t('insideP1')}</p>
          <p>${t('insideP2', c.weeks||8)}</p>
          ${saReview}
        </div></div>`
      : `<div class="preview-body-inner">
        <div>
          <h2>${t('inside')}</h2>
          <p>${c._description || t('insideP1')}</p>
          <p>${t('insideP2', c.weeks||8)}</p>
          <h2 style="margin-top:28px">${t('locked')}</h2>
          <p>${t('lockedP')}</p>
        </div>
        <div class="specs">
          <div class="price">€${c.price_eur}</div>
          <div style="font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:20px">${t('once')}</div>
          <div class="row"><span class="k">${t('budget')}</span><span class="v">€${c.budget_eur.toLocaleString('en-US')}</span></div>
          <div class="row"><span class="k">${t('timeline')}</span><span class="v">${c.weeks||8} ${t('weeks')}</span></div>
          <div class="row"><span class="k">${t('size')}</span><span class="v">${c.size_m2||'—'}m²</span></div>
          <div class="row"><span class="k">${t('category')}</span><span class="v">${c.category}</span></div>
          <a class="btn" href="account.html?buy=${c.slug}">
            ${t('buy')} €${c.price_eur}
            <svg width="14" height="10" viewBox="0 0 14 10" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 5h12M9 1l4 4-4 4"/></svg>
          </a>
          <div class="lock-note">${t('lockNote')}</div>
        </div>
      </div>`;
  frame.innerHTML = `
    <div class="preview-body">
      <div class="preview-hero">
        <div class="collage" id="collage"></div>
        <div class="glyph" id="glyph">${c._theme.glyph || ''}</div>
        <div class="meta">
          <div class="tag">${c.category.toUpperCase()} · ${c.size_m2||''}m²</div>
          <h1>${c.name}</h1>
          <div class="tag">${c.tagline||''}</div>
        </div>
      </div>
      ${body}
    </div>`;
  buildCollage(c);
}

async function buildCollage(c){
  const slug = c.slug;
  const hero = c.hero_image || (SA_FULL && SA_FULL.catalog && SA_FULL.catalog.hero_image) || '';
  const candidates = Array.from(new Set([
    hero,
    `data/concepts/${slug}/images/01-hero.png`,
    `data/concepts/${slug}/images/01-hero-interior.png`,
    `data/concepts/${slug}/images/01-trattoria-interior.png`,
    `data/concepts/${slug}/images/01-ramen-interior.png`,
    `data/concepts/${slug}/images/01-salon-popart.png`,
    `data/concepts/${slug}/images/01-floorplan-isometric.png`,
    `data/concepts/${slug}/images/02-interior-render.png`,
    `data/concepts/${slug}/images/03-equipment-catalog.png`,
    `data/concepts/${slug}/images/04-coffee-vibrant.png`,
    `data/concepts/${slug}/hero.png`,
  ].filter(Boolean)));
  const probes = await Promise.all(candidates.map(src => new Promise(res => {
    const img = new Image();
    img.onload = () => res(src);
    img.onerror = () => res(null);
    img.src = src;
  })));
  const found = probes.filter(Boolean);
  const collage = document.getElementById('collage');
  const glyph = document.getElementById('glyph');
  if(!collage) return;
  if(found.length === 0){
    collage.remove();
    return;
  }
  if(glyph) glyph.remove();
  // Always fill a 4-tile 2x2 grid — duplicate found images with varied crops.
  const tiles = [];
  for(let i=0;i<4;i++) tiles.push(found[i % found.length]);
  collage.classList.add('n4');
  const bps = ['center 40%','70% 30%','30% 70%','center 60%'];
  const zooms = ['scale(1.05)','scale(1.15)','scale(1.1)','scale(1.2)'];
  collage.innerHTML = tiles.map((src,i)=>
    `<div class="tile" style="background-image:url('${src}');background-position:${bps[i]};transform:${zooms[i]}"></div>`
  ).join('');
}

/* ===== Topbar lang menu wire-up ===== */
function buildLangMenu(){
  const menu = document.getElementById('langMenu');
  const cur = document.getElementById('langCurrent');
  if(!menu || !cur) return;
  cur.textContent = CURRENT_LANG.toUpperCase();
  menu.innerHTML = LANGS.map(l =>
    `<button type="button" data-lang="${l.c}"${l.c===CURRENT_LANG?' class="active"':''}>${l.c.toUpperCase()} · ${l.n}</button>`
  ).join('');
  menu.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      menu.classList.remove('open');
      window.setLang(b.dataset.lang);
      cur.textContent = b.dataset.lang.toUpperCase();
      menu.querySelectorAll('button').forEach(x => x.classList.toggle('active', x.dataset.lang === b.dataset.lang));
    });
  });
  const btn = document.getElementById('langBtn');
  btn.addEventListener('click', e => { e.stopPropagation(); menu.classList.toggle('open'); });
  document.addEventListener('click', e => { if(!e.target.closest('#langChip')) menu.classList.remove('open'); });
}
buildLangMenu();
</script>
