<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="google-translate-customization" content="">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Opening concept… — micro.svita</title>
  <meta http-equiv="Cache-Control" content="no-store">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/svita-rust.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#EFEAE0;color:#2F4438;font-family:'Cormorant Garamond',Georgia,serif;font-weight:300}
    .stage{display:grid;place-items:center;min-height:100vh;padding:40px;text-align:center}
    .ring{width:32px;height:32px;border:2px solid #2F4438;border-right-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 22px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .lab{font-size:14px;letter-spacing:.2em;text-transform:uppercase;opacity:.6}
    .err{max-width:480px}
    .err h1{font-size:32px;font-weight:300;margin:14px 0 10px;letter-spacing:-.01em}
    .err p{font-size:16px;line-height:1.5;opacity:.7;margin-bottom:24px;font-style:italic}
    .err a{display:inline-block;padding:14px 26px;border:1px solid #2F4438;text-decoration:none;color:#2F4438;font-family:'Inter',system-ui,sans-serif;font-weight:500;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-style:normal}
    .err a:hover{background:#2F4438;color:#EFEAE0}
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div>
      <div class="ring" aria-hidden="true"></div>
      <div class="lab">Opening concept</div>
    </div>
  </div>
  <script>
  (async () => {
    const params = new URLSearchParams(location.search);
    const slug = (params.get('c') || params.get('slug') || '').trim().toLowerCase();
    const stage = document.getElementById('stage');
    function fail(title, body) {
      stage.innerHTML = `<div class="err">
        <h1>${title}</h1>
        <p>${body}</p>
        <a href="/shop.html">Browse all concepts →</a>
      </div>`;
    }
    if (!slug) { fail('No concept selected.', 'Pick one from the catalogue and we’ll open it for you.'); return; }
    try {
      const r = await fetch('/data/library_routes.json', { cache: 'no-store' });
      if (!r.ok) throw new Error('routes ' + r.status);
      const routes = await r.json();
      const hit = routes[slug];
      if (!hit || !hit.folder) {
        fail('Concept not found.', 'It might have been renamed or retired. Browse the library and we’ll point you somewhere similar.');
        return;
      }
      const target = `/presentations/${encodeURIComponent(hit.folder).replace(/%2F/g, '/')}/`;
      location.replace(target + location.hash);
    } catch (e) {
      console.error(e);
      fail('Could not load the library map.', 'Check your connection and try again — the catalogue lives at /shop.html.');
    }
  })();
  </script>
<script src="js/svita-advisor.js" defer></script>
</body>
</html>
