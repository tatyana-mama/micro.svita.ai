<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SVITA Micro — Concept Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-1:#FFC8DD;
  --bg-2:#B4E33D;
  --accent:#FF006E;
  --ink:#0F172A;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:var(--ink);overflow:hidden}
body{
  background:
    radial-gradient(ellipse at top left,var(--bg-1) 0%,transparent 55%),
    radial-gradient(ellipse at bottom right,var(--bg-2) 0%,transparent 55%),
    #FFFBF0;
  transition:background 800ms var(--ease);
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:var(--pattern,none);
  background-size:var(--pattern-size,240px);
  opacity:var(--pattern-opacity,0.18);
  z-index:0;
  animation:drift 30s linear infinite;
}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-240px)}}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:20px 28px;display:flex;align-items:center;justify-content:space-between;
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-family:'Space Grotesk';font-weight:700;font-size:16px;
  background:rgba(10,10,11,0.85);color:#fff;
  padding:10px 18px;border-radius:100px;backdrop-filter:blur(12px);
  text-decoration:none;
}
.brand-dot{width:8px;height:8px;border-radius:50%;background:#D6FF3E}
.concept-chip{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);
  padding:10px 18px;border-radius:100px;
  font-size:13px;font-weight:500;color:var(--ink);
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.concept-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.concept-chip strong{font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn-close{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.92);color:var(--ink);
  padding:10px 18px;border-radius:100px;font-size:13px;font-weight:500;
  border:1px solid rgba(0,0,0,0.08);text-decoration:none;
  transition:all 200ms var(--ease);
}
.btn-close:hover{background:#fff;transform:translateY(-1px)}
.btn-close svg{width:14px;height:14px}

/* ===== AMBIENT LABELS ===== */
.amb{
  position:fixed;z-index:1;pointer-events:none;
  font-family:'Space Grotesk';font-weight:700;
  color:rgba(15,23,42,0.1);
  text-transform:uppercase;letter-spacing:-0.02em;
}
.amb-tag{
  position:fixed;z-index:2;
  background:rgba(255,255,255,0.82);backdrop-filter:blur(10px);
  padding:8px 16px;border-radius:100px;font-size:11px;font-weight:600;
  color:var(--ink);letter-spacing:0.08em;text-transform:uppercase;
  border:1px solid rgba(0,0,0,0.06);box-shadow:0 4px 14px rgba(0,0,0,0.06);
  animation:fadeUp 900ms var(--ease) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== CENTERED FRAME ===== */
.stage{
  position:fixed;inset:0;z-index:5;
  display:flex;align-items:center;justify-content:center;
  padding:88px 40px 40px;
}
.frame{
  width:100%;max-width:1280px;
  height:100%;max-height:calc(100vh - 128px);
  background:#fff;border-radius:20px;overflow:hidden;
  box-shadow:0 60px 120px rgba(15,23,42,0.28),0 20px 60px rgba(15,23,42,0.14),0 0 0 1px rgba(255,255,255,0.6);
  animation:pop 700ms var(--ease) 100ms both;
  position:relative;
}
@keyframes pop{from{opacity:0;transform:scale(0.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.frame iframe{width:100%;height:100%;border:0;display:block;background:#fff}

/* ===== PREVIEW MODE (no brandbook yet) ===== */
.preview-body{
  display:flex;flex-direction:column;height:100%;overflow-y:auto;
  background:linear-gradient(180deg,#fff 0%,#FAFAFA 100%);
}
.preview-hero{
  position:relative;aspect-ratio:16/9;width:100%;
  background:linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 100%);
  display:flex;align-items:flex-end;padding:40px;
}
.preview-hero .glyph{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:220px;opacity:0.18;font-family:'Space Grotesk';font-weight:700;
}
.preview-hero .meta{
  position:relative;z-index:2;display:flex;flex-direction:column;gap:10px;color:#fff;
  text-shadow:0 2px 20px rgba(0,0,0,0.2);
}
.preview-hero h1{
  font-family:'Space Grotesk';font-size:clamp(2rem,4vw,3.5rem);font-weight:700;
  letter-spacing:-0.03em;line-height:1;
}
.preview-hero .tag{font-size:14px;opacity:0.9;font-weight:500}
.preview-body-inner{padding:40px;display:grid;grid-template-columns:2fr 1fr;gap:32px}
@media(max-width:760px){.preview-body-inner{grid-template-columns:1fr}}
.preview-body-inner h2{font-family:'Space Grotesk';font-size:22px;margin-bottom:12px}
.preview-body-inner p{color:#475569;font-size:15px;line-height:1.6;margin-bottom:16px}
.specs{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:16px;padding:24px;height:fit-content}
.specs .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed #E2E8F0;font-size:13px}
.specs .row:last-child{border:0}
.specs .row .k{color:#94A3B8;text-transform:uppercase;letter-spacing:0.08em;font-size:11px;font-weight:600}
.specs .row .v{font-weight:600;color:var(--ink)}
.specs .price{font-family:'Space Grotesk';font-size:42px;font-weight:700;color:var(--accent);margin-bottom:8px}
.specs .btn{
  display:flex;justify-content:center;align-items:center;gap:8px;
  width:100%;padding:14px;border-radius:100px;
  background:var(--ink);color:#fff;font-weight:600;font-size:14px;
  border:0;cursor:pointer;margin-top:20px;transition:all 200ms var(--ease);
  text-decoration:none;
}
.specs .btn:hover{background:var(--accent);transform:translateY(-1px)}
.lock-note{
  margin-top:16px;padding:14px 18px;background:rgba(255,255,255,0.7);
  border-radius:12px;font-size:12px;color:#64748B;text-align:center;
  border:1px dashed #CBD5E1;
}

/* ===== LOADING ===== */
.loading{
  position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(255,251,240,0.9);backdrop-filter:blur(6px);
}
.loading .spinner{
  width:40px;height:40px;border:3px solid rgba(15,23,42,0.1);border-top-color:var(--accent);
  border-radius:50%;animation:spin 900ms linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

@media(max-width:768px){
  .stage{padding:76px 16px 16px}
  .amb-tag{display:none}
}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<!-- Top bar -->
<div class="topbar">
  <a href="index.html" class="brand">
    <span class="brand-dot"></span> SVITA · MICRO
  </a>
  <div class="topbar-right">
    <div class="concept-chip" id="chip">
      <span class="dot"></span>
      <span id="chipText">Loading…</span>
    </div>
    <a href="index.html#gallery" class="btn-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      Close
    </a>
  </div>
</div>

<!-- Ambient decoration slots (rendered by JS) -->
<div id="ambient"></div>

<!-- Centered concept window -->
<div class="stage">
  <div class="frame" id="frame">
    <!-- Either iframe (if brandbook exists) or preview DOM injected here -->
  </div>
</div>

<script>
/* ===========================================================
   THEMES — full brand themes for real concepts,
   category-based fallback for the other 194.
=========================================================== */
const THEMES = {
  'poppy-matcha':{
    bg1:'#FFC8DD', bg2:'#B4E33D', accent:'#FF006E',
    pattern:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240' viewBox='0 0 240 240'><g fill='none' stroke='%23FF006E' stroke-width='3'><circle cx='40' cy='40' r='12'/><path d='M100 30 Q115 10 130 30 T160 30'/><rect x='30' y='120' width='18' height='18' transform='rotate(20 39 129)'/><path d='M150 140 L180 140 M165 125 L165 155'/><circle cx='210' cy='80' r='6' fill='%23FF006E'/></g></svg>\")",
    glyph:'🍵', tags:['Memphis','Matcha','Kiosk','€0 renovation']
  },
  'nonnas-trattoria':{
    bg1:'#F4E4BC', bg2:'#C17A3E', accent:'#8B2C1C',
    pattern:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'><path d='M0 0h30v30H0zM30 30h30v30H30z' fill='%238B2C1C' fill-opacity='0.25'/></svg>\")",
    glyph:'🍝', tags:['Tuscany','Wood fire','28 seats','Family-run']
  },
  'tokyo-ramen-bar':{
    bg1:'#1A1A1F', bg2:'#3D1A1A', accent:'#E63946',
    pattern:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><g fill='%23E63946' opacity='0.5'><rect x='0' y='0' width='120' height='4'/><rect x='0' y='40' width='120' height='2'/><rect x='0' y='80' width='120' height='6'/></g></svg>\")",
    glyph:'🍜', tags:['Izakaya','12 seats','One chef','4 SKU ramen']
  },
  'madonna-pop-salon':{
    bg1:'#FF8FB1', bg2:'#FFD93D', accent:'#D62898',
    pattern:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><g fill='%23D62898' opacity='0.5'><circle cx='20' cy='20' r='3'/><circle cx='60' cy='60' r='3'/><circle cx='20' cy='60' r='3'/><circle cx='60' cy='20' r='3'/><circle cx='40' cy='40' r='5'/></g></svg>\")",
    glyph:'💋', tags:['80s Pop Art','Madonna era','Beauty','3 stations']
  },
  'scandi-coffee':{
    bg1:'#F5F1E8', bg2:'#D4B896', accent:'#2D3E2D',
    pattern:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><g stroke='%232D3E2D' stroke-width='1' fill='none' opacity='0.4'><path d='M20 80 Q50 20 80 80'/></g></svg>\")",
    glyph:'☕', tags:['Scandi','Specialty','50m²','La Marzocco']
  },
  'vibrant-coffee':{
    bg1:'#FDE047', bg2:'#F97316', accent:'#DC2626',
    pattern:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><g fill='%23DC2626' opacity='0.4'><polygon points='50,10 60,40 90,40 65,60 75,90 50,70 25,90 35,60 10,40 40,40'/></g></svg>\")",
    glyph:'☕', tags:['Vibrant','Brutalist','Yellow','40m²']
  }
};

const CATEGORY_PALETTES = {
  food:        {bg1:'#FFE4B5',bg2:'#FFA07A',accent:'#FF4500',glyph:'🍽'},
  restaurant:  {bg1:'#F4E4BC',bg2:'#C17A3E',accent:'#8B2C1C',glyph:'🍷'},
  beauty:      {bg1:'#FFD1DC',bg2:'#FF8FB1',accent:'#D62898',glyph:'💅'},
  service:     {bg1:'#DBEAFE',bg2:'#93C5FD',accent:'#1D4ED8',glyph:'🛠'},
  repair:      {bg1:'#E5E7EB',bg2:'#9CA3AF',accent:'#111827',glyph:'⚙'},
  craft:       {bg1:'#FEF3C7',bg2:'#FBBF24',accent:'#92400E',glyph:'✂'},
  retail:      {bg1:'#E0E7FF',bg2:'#A5B4FC',accent:'#4338CA',glyph:'🛍'},
  wellness:    {bg1:'#D1FAE5',bg2:'#6EE7B7',accent:'#047857',glyph:'🧘'},
  health:      {bg1:'#CFFAFE',bg2:'#67E8F9',accent:'#0E7490',glyph:'➕'},
  education:   {bg1:'#FCE7F3',bg2:'#F9A8D4',accent:'#BE185D',glyph:'✎'}
};

// Concepts that have a real brandbook.html on disk
const HAS_BRANDBOOK = new Set(['poppy-matcha']);

/* ===== MAIN ===== */
(async function init(){
  const params = new URLSearchParams(location.search);
  const slug = params.get('c') || params.get('slug') || 'poppy-matcha';
  let concept = null;

  try{
    const res = await fetch('data/catalog.json',{cache:'no-cache'});
    if(res.ok){
      const catalog = await res.json();
      concept = catalog.find(c=>c.slug===slug);
    }
  }catch(e){ /* catalog may not exist yet */ }

  // Fallback concept for POPPY MATCHA if no catalog yet
  if(!concept && slug==='poppy-matcha'){
    concept = {
      slug:'poppy-matcha', name:'POPPY MATCHA', category:'food', country:'NL',
      size_m2:8, price_eur:49, budget_eur:11850, weeks:7,
      hero_image:'data/concepts/poppy-matcha/images/01-hero-interior.png',
      tagline:'Ceremonial-grade matcha kiosk with Memphis soul.'
    };
  }
  if(!concept){
    document.getElementById('frame').innerHTML = '<div style="padding:60px;text-align:center;font-family:Inter"><h2 style="font-family:Space Grotesk;margin-bottom:12px">Concept not found</h2><p style="color:#64748B">Slug: '+slug+'</p><a href="index.html" style="display:inline-block;margin-top:20px;padding:12px 24px;background:#0F172A;color:#fff;border-radius:100px;text-decoration:none">Back to shop</a></div>';
    document.getElementById('loading').classList.add('hidden');
    return;
  }

  applyTheme(concept);
  renderChip(concept);
  renderAmbient(concept);
  renderFrame(concept);
  document.getElementById('loading').classList.add('hidden');
})();

function applyTheme(concept){
  const theme = THEMES[concept.slug] || CATEGORY_PALETTES[concept.category] || CATEGORY_PALETTES.food;
  const r = document.documentElement;
  r.style.setProperty('--bg-1',theme.bg1);
  r.style.setProperty('--bg-2',theme.bg2);
  r.style.setProperty('--accent',theme.accent);
  if(theme.pattern){
    r.style.setProperty('--pattern',theme.pattern);
    r.style.setProperty('--pattern-opacity','0.22');
  }
  // stash for downstream
  concept._theme = theme;
}

function renderChip(c){
  document.getElementById('chipText').innerHTML =
    '<strong>'+c.name+'</strong> · '+c.country+' · €'+c.budget_eur.toLocaleString('en-US');
}

function renderAmbient(c){
  const wrap = document.getElementById('ambient');
  const tags = (c._theme.tags || [c.category, c.country, c.size_m2+'m²', '€'+c.budget_eur.toLocaleString()]).slice(0,4);
  const positions = [
    {top:'14%',left:'4%'},
    {top:'76%',left:'6%'},
    {top:'20%',right:'4%'},
    {top:'82%',right:'5%'}
  ];
  tags.forEach((t,i)=>{
    const el = document.createElement('div');
    el.className = 'amb-tag';
    el.style.animationDelay = (i*120+300)+'ms';
    Object.assign(el.style, positions[i]);
    el.textContent = t;
    wrap.appendChild(el);
  });
}

function renderFrame(c){
  const frame = document.getElementById('frame');
  if(HAS_BRANDBOOK.has(c.slug)){
    // real brandbook → iframe
    const iframe = document.createElement('iframe');
    iframe.src = 'data/concepts/'+c.slug+'/brandbook.html';
    iframe.title = c.name + ' brandbook';
    frame.appendChild(iframe);
    return;
  }
  // Preview mode (locked / not yet generated)
  frame.innerHTML = `
    <div class="preview-body">
      <div class="preview-hero">
        <div class="glyph">${c._theme.glyph || ''}</div>
        <div class="meta">
          <div class="tag">${c.category.toUpperCase()} · ${c.country} · ${c.size_m2||''}m²</div>
          <h1>${c.name}</h1>
          <div class="tag">${c.tagline||''}</div>
        </div>
      </div>
      <div class="preview-body-inner">
        <div>
          <h2>What's inside</h2>
          <p>A full launch package — brandbook (25 pages), equipment list with real models and prices, country-specific registration walkthrough, week-by-week timeline, P&L projection, and supplier directory.</p>
          <p>Everything a first-time founder needs to open in ${c.weeks||8} weeks. No guesswork. No wasted money.</p>
          <h2 style="margin-top:28px">Preview locked</h2>
          <p>Buy this concept to unlock the full brandbook PDF, editable source files, and your country's registration plan.</p>
        </div>
        <div class="specs">
          <div class="price">€${c.price_eur}</div>
          <div style="font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:20px">One-time · Lifetime access</div>
          <div class="row"><span class="k">Budget</span><span class="v">€${c.budget_eur.toLocaleString('en-US')}</span></div>
          <div class="row"><span class="k">Timeline</span><span class="v">${c.weeks||8} weeks</span></div>
          <div class="row"><span class="k">Size</span><span class="v">${c.size_m2||'—'}m²</span></div>
          <div class="row"><span class="k">Country</span><span class="v">${c.country}</span></div>
          <div class="row"><span class="k">Category</span><span class="v">${c.category}</span></div>
          <a class="btn" href="account.html?buy=${c.slug}">
            Buy €${c.price_eur}
            <svg width="14" height="10" viewBox="0 0 14 10" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 5h12M9 1l4 4-4 4"/></svg>
          </a>
          <div class="lock-note">Full brandbook unlocks after purchase.</div>
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>
