/* ============ TOOLTIP ============ */
const Tooltip = ({content, position={x:0,y:0}, visible}) => {
  if (!M) return null;
  return (
    <AnimP>
      {visible && (
        <Motion.div
          initial={{opacity:0, y:6, scale:.96}}
          animate={{opacity:1, y:0, scale:1}}
          exit={{opacity:0, y:6, scale:.96}}
          transition={{duration:.18}}
          className="fixed z-50 pointer-events-none"
          style={{left:position.x+14, top:position.y+14, maxWidth:300}}
        >
          <div className="bg-[#1A1A1A]/95 border border-[#B89569]/30 backdrop-blur-md px-4 py-3 rounded-sm shadow-2xl">
            {content}
          </div>
        </Motion.div>
      )}
    </AnimP>
  );
};

const useTooltip = () => {
  const [state, setState] = useState({visible:false, content:null, pos:{x:0,y:0}});
  const show = (content) => (e) => setState({visible:true, content, pos:{x:e.clientX, y:e.clientY}});
  const move = (e) => setState(s => s.visible ? {...s, pos:{x:e.clientX, y:e.clientY}} : s);
  const hide = () => setState(s => ({...s, visible:false}));
  return {state, show, move, hide};
};

/* ============ CAPEX DONUT ============ */
const CapexDonut = ({onHover, onLeave, onMove}) => {
  const total = CONCEPT.capex.reduce((s,c) => s+c.value, 0);
  let offset = 0;
  const size = 280, r = 110, c = 2*Math.PI*r;
  return (
    <div className="flex items-center gap-12">
      <div className="relative" style={{width:size, height:size}}>
        <svg width={size} height={size} className="transform -rotate-90">
          {CONCEPT.capex.map((seg, i) => {
            const frac = seg.value / total;
            const len = c * frac;
            const dash = `${len} ${c-len}`;
            const el = (
              <circle
                key={i}
                cx={size/2} cy={size/2} r={r}
                fill="none"
                stroke={seg.color}
                strokeWidth="36"
                strokeDasharray={dash}
                strokeDashoffset={-offset}
                style={{cursor:'help', transition:'stroke-width .2s'}}
                onMouseEnter={onHover({title:seg.label, body:`€${seg.value.toLocaleString()} · ${(frac*100).toFixed(1)}% of CAPEX`})}
                onMouseMove={onMove}
                onMouseLeave={onLeave}
              />
            );
            offset += len;
            return el;
          })}
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <div className="text-[10px] tracking-[.25em] opacity-50 uppercase">CAPEX</div>
          <div className="serif text-4xl mt-1">€{(total/1000).toFixed(0)}k</div>
          <div className="text-[10px] opacity-50 mt-1 italic">planning total</div>
        </div>
      </div>
      <div className="space-y-2.5">
        {CONCEPT.capex.map((seg,i) => (
          <div key={i} className="flex items-center gap-3 text-sm">
            <div className="w-3 h-3 rounded-sm" style={{background:seg.color}}></div>
            <div className="flex-1 flex justify-between gap-6 w-64 hair border-b pb-1.5">
              <span className="opacity-80">{seg.label}</span>
              <span className="serif">€{seg.value.toLocaleString()}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};
