<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin · SVITA Micro</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='10' fill='%23D6FF3E'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#0A0A0B;--bg-1:#111113;--bg-2:#18181B;--line:#232326;--line-2:#2A2A2F;
  --text:#FAFAFA;--text-2:#A1A1AA;--text-3:#71717A;--accent:#D6FF3E;
  --ok:#22c55e;--warn:#f59e0b;--err:#ef4444;
  --radius:14px;--ease:cubic-bezier(0.22,1,0.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:1400px;margin:0 auto;padding:24px 32px}

/* top bar */
header{
  position:sticky;top:0;z-index:50;background:rgba(10,10,11,0.88);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 32px}
.brand{font-family:'Space Grotesk';font-weight:700;font-size:16px;display:flex;align-items:center;gap:10px}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.brand .role{font-family:'JetBrains Mono';font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:0.15em;padding:4px 10px;border:1px solid var(--accent);border-radius:100px;margin-left:12px}
.user-meta{display:flex;gap:16px;align-items:center;font-family:'JetBrains Mono';font-size:11px;color:var(--text-3)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:100px;
  font-family:'Space Grotesk';font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--line);
  background:transparent;color:var(--text);transition:all 200ms}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#0A0A0B;border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.1);color:#0A0A0B}
.btn.danger:hover{border-color:var(--err);color:var(--err)}

/* stats row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:24px 0 32px}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px}
.stat .k{font-family:'JetBrains Mono';font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px}
.stat .v{font-family:'Space Grotesk';font-size:32px;font-weight:700;letter-spacing:-0.02em}
.stat .v.ok{color:var(--accent)}
.stat .v.warn{color:var(--warn)}

/* filter bar */
.bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.bar input,.bar select{
  background:var(--bg-1);border:1px solid var(--line);color:var(--text);
  padding:9px 14px;border-radius:100px;font-size:12px;font-family:inherit;
}
.bar input{min-width:240px}
.bar input:focus,.bar select:focus{outline:none;border-color:var(--accent)}

/* table */
.table-wrap{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  text-align:left;padding:14px 16px;background:var(--bg-2);
  font-family:'JetBrains Mono';font-size:10px;text-transform:uppercase;
  color:var(--text-3);letter-spacing:0.12em;font-weight:600;border-bottom:1px solid var(--line);
  position:sticky;top:0;
}
tbody td{padding:14px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover{background:rgba(255,255,255,0.02)}
tbody tr:last-child td{border-bottom:none}
.slug{font-family:'JetBrains Mono';font-size:11px;color:var(--text-3)}
.name{font-weight:600;color:var(--text)}
.thumb{width:48px;height:32px;border-radius:6px;background:var(--bg-2);background-size:cover;background-position:center;flex:none}
.cell-name{display:flex;gap:12px;align-items:center}
.chip{display:inline-block;padding:4px 10px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;font-family:'JetBrains Mono'}
.chip.cat{background:var(--bg-2);color:var(--text-2);border:1px solid var(--line)}
.chip.country{background:var(--bg-2);color:var(--text-2);border:1px solid var(--line)}
.badge-v{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:100px;font-family:'JetBrains Mono';font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em}
.badge-v.v{background:rgba(34,197,94,0.12);color:var(--ok);border:1px solid rgba(34,197,94,0.3)}
.badge-v.u{background:rgba(245,158,11,0.12);color:var(--warn);border:1px solid rgba(245,158,11,0.3)}
.badge-v .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.langs{font-family:'JetBrains Mono';font-size:11px;color:var(--text-3)}
.langs strong{color:var(--text-2)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.row-actions .btn{padding:6px 12px;font-size:11px}

/* gate */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
.gate-card{max-width:440px;width:100%;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius);padding:40px}
.gate-card h1{font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-bottom:10px}
.gate-card p{color:var(--text-3);font-size:13px;margin-bottom:24px}
.gate-card input{width:100%;padding:14px 16px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;color:var(--text);font-family:inherit;font-size:14px;margin-bottom:12px}
.gate-card input:focus{outline:none;border-color:var(--accent)}
.gate-card .btn{width:100%;justify-content:center;padding:14px}
.gate-msg{margin-top:14px;padding:10px 12px;border-radius:8px;font-size:12px;text-align:center}
.gate-msg.ok{background:rgba(214,255,62,0.1);color:var(--accent);border:1px solid rgba(214,255,62,0.25)}
.gate-msg.err{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.25)}
.hidden{display:none !important}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{padding:60px;text-align:center;color:var(--text-3)}
</style>
</head>
<body>

<!-- GATE: login + admin check -->
<div id="gate" class="gate">
  <div class="gate-card">
    <div id="gate-login">
      <h1>Admin</h1>
      <p>Sign in with your admin email. Magic link will be sent.</p>
      <form id="gate-form">
        <input type="email" id="gate-email" placeholder="admin@svita.ai" required>
        <button class="btn primary" type="submit" id="gate-btn">Send magic link →</button>
      </form>
      <div id="gate-msg"></div>
    </div>
    <div id="gate-denied" class="hidden">
      <h1>Access denied</h1>
      <p>This account is not an admin. Contact господин.</p>
      <button class="btn" id="gate-signout">Sign out</button>
    </div>
    <div id="gate-check" class="hidden loading"><span class="spin"></span></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <div class="topbar">
      <div class="brand"><span class="dot"></span> SVITA<small style="font-family:'JetBrains Mono';font-size:10px;color:var(--text-3);letter-spacing:0.15em;margin-left:6px">MICRO</small> <span class="role">Admin</span></div>
      <div class="user-meta">
        <span id="u-email"></span>
        <button class="btn" id="signout">Sign out</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="stats">
      <div class="stat"><div class="k">Total concepts</div><div class="v" id="s-total">—</div></div>
      <div class="stat"><div class="k">Verified</div><div class="v ok" id="s-verified">—</div></div>
      <div class="stat"><div class="k">Unverified</div><div class="v warn" id="s-unverified">—</div></div>
      <div class="stat"><div class="k">Avg i18n coverage</div><div class="v" id="s-i18n">—</div></div>
    </div>

    <div class="bar">
      <input type="search" id="q" placeholder="Search name or slug…">
      <select id="f-status">
        <option value="all">All statuses</option>
        <option value="unverified">Unverified only</option>
        <option value="verified">Verified only</option>
      </select>
      <select id="f-cat">
        <option value="all">All categories</option>
      </select>
    </div>

    <div class="table-wrap">
      <div id="t-loading" class="loading"><span class="spin"></span></div>
      <table id="t" class="hidden">
        <thead>
          <tr>
            <th>Concept</th>
            <th>Category</th>
            <th>Country</th>
            <th>Price</th>
            <th>Status</th>
            <th>i18n (12 langs)</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="t-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SB_URL='https://ctdleobjnzniqkqomlrq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0ZGxlb2JqbnpuaXFrcW9tbHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzE4MTEsImV4cCI6MjA4NzgwNzgxMX0.AMHtY7zGPemKYCxMy2bqRTOEAp8trA_Slor9wmg7C38';
const sb = supabase.createClient(SB_URL, SB_KEY);
const $ = id => document.getElementById(id);
const LANGS = ['be','de','en','es','fr','it','ja','ko','pl','pt','ru','uk'];

let ROWS = [], I18N_COUNTS = {};
const STATE = {q:'', status:'all', cat:'all'};

// ═══════════════ AUTH GATE ═══════════════
async function boot(){
  const {data:{session}} = await sb.auth.getSession();
  if(session && session.user){
    await checkAdmin(session.user);
  }
}
sb.auth.onAuthStateChange(async (event, session)=>{
  if(event === 'SIGNED_IN' && session) await checkAdmin(session.user);
  if(event === 'SIGNED_OUT'){
    $('app').classList.add('hidden');
    $('gate').classList.remove('hidden');
    $('gate-login').classList.remove('hidden');
    $('gate-denied').classList.add('hidden');
    $('gate-check').classList.add('hidden');
  }
});

async function checkAdmin(user){
  $('gate-login').classList.add('hidden');
  $('gate-check').classList.remove('hidden');
  const {data, error} = await sb.from('profiles').select('role').eq('user_id', user.id).maybeSingle();
  $('gate-check').classList.add('hidden');
  if(error || !data || data.role !== 'admin'){
    $('gate-denied').classList.remove('hidden');
    return;
  }
  // admin confirmed
  $('gate').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('u-email').textContent = user.email;
  await loadData();
}

$('gate-form').addEventListener('submit', async e=>{
  e.preventDefault();
  const email = $('gate-email').value.trim();
  $('gate-btn').disabled = true;
  $('gate-btn').innerHTML = '<span class="spin"></span> sending…';
  const {error} = await sb.auth.signInWithOtp({
    email, options:{ emailRedirectTo: location.origin + '/admin.html' }
  });
  $('gate-btn').disabled = false;
  $('gate-btn').innerHTML = 'Send magic link →';
  $('gate-msg').innerHTML = error
    ? `<div class="gate-msg err">${error.message}</div>`
    : `<div class="gate-msg ok">Check ${email} — link sent.</div>`;
});

$('gate-signout').addEventListener('click', async ()=>{ await sb.auth.signOut(); });
$('signout').addEventListener('click', async ()=>{ await sb.auth.signOut(); });

// ═══════════════ DATA ═══════════════
async function loadData(){
  // primary: DB concepts_catalog (RLS returns all for admin)
  let {data:dbRows, error} = await sb.from('concepts_catalog').select('*').order('created_at',{ascending:false});
  if(error || !dbRows || dbRows.length === 0){
    // fallback: local catalog.json, mark all as unverified
    try{
      const r = await fetch('data/catalog.json');
      const local = await r.json();
      dbRows = local.map(c=>({...c, verified:false, _source:'local'}));
    }catch(e){
      $('t-loading').textContent = 'Failed to load catalog';
      return;
    }
  }
  ROWS = dbRows;
  // fetch i18n counts per slug
  const {data:i18n} = await sb.from('concepts_i18n').select('concept_slug, lang_code');
  I18N_COUNTS = {};
  if(i18n){
    i18n.forEach(r=>{
      I18N_COUNTS[r.concept_slug] = (I18N_COUNTS[r.concept_slug] || 0) + 1;
    });
  }
  // category filter options
  const cats = [...new Set(ROWS.map(r=>r.category))].sort();
  const sel = $('f-cat');
  cats.forEach(c=>{
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
  renderStats();
  render();
  $('t-loading').classList.add('hidden');
  $('t').classList.remove('hidden');
}

function renderStats(){
  $('s-total').textContent = ROWS.length;
  const v = ROWS.filter(r=>r.verified).length;
  $('s-verified').textContent = v;
  $('s-unverified').textContent = ROWS.length - v;
  const avg = ROWS.reduce((a,r)=> a + (I18N_COUNTS[r.slug]||0), 0) / (ROWS.length || 1);
  $('s-i18n').textContent = avg.toFixed(1) + ' / 12';
}

function render(){
  const body = $('t-body');
  const q = STATE.q.toLowerCase();
  const filtered = ROWS.filter(r=>{
    if(STATE.status === 'verified' && !r.verified) return false;
    if(STATE.status === 'unverified' && r.verified) return false;
    if(STATE.cat !== 'all' && r.category !== STATE.cat) return false;
    if(q && !(r.name.toLowerCase().includes(q) || r.slug.toLowerCase().includes(q))) return false;
    return true;
  });
  if(!filtered.length){
    body.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-3)">No concepts match</td></tr>`;
    return;
  }
  body.innerHTML = filtered.map(r=>{
    const isPh = r.hero_image && r.hero_image.startsWith('placeholder:');
    const imgStyle = isPh ? '' : `style="background-image:url('${r.hero_image}')"`;
    const langCount = I18N_COUNTS[r.slug] || 0;
    return `
      <tr data-slug="${r.slug}">
        <td>
          <div class="cell-name">
            <div class="thumb" ${imgStyle}></div>
            <div>
              <div class="name">${r.name}</div>
              <div class="slug">${r.slug}</div>
            </div>
          </div>
        </td>
        <td><span class="chip cat">${r.category}</span></td>
        <td><span class="chip country">${r.country}</span></td>
        <td>€${r.price_eur}</td>
        <td>
          <span class="badge-v ${r.verified?'v':'u'}">
            <span class="d"></span>${r.verified?'Verified':'Unverified'}
          </span>
        </td>
        <td><span class="langs"><strong>${langCount}</strong> / 12</span></td>
        <td>
          <div class="row-actions">
            <a class="btn" href="view.html?c=${r.slug}" target="_blank">Preview</a>
            <button class="btn ${r.verified?'danger':'primary'}" data-action="toggle">${r.verified?'Unverify':'Verify'}</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

$('t-body').addEventListener('click', async e=>{
  const btn = e.target.closest('[data-action="toggle"]');
  if(!btn) return;
  const slug = btn.closest('tr').dataset.slug;
  const row = ROWS.find(r=>r.slug === slug);
  if(!row) return;
  btn.disabled = true;
  const newVal = !row.verified;
  const {error} = await sb.from('concepts_catalog').update({
    verified: newVal,
    verified_at: newVal ? new Date().toISOString() : null
  }).eq('slug', slug);
  btn.disabled = false;
  if(error){
    alert('Update failed: ' + error.message);
    return;
  }
  row.verified = newVal;
  renderStats();
  render();
});

$('q').addEventListener('input', e=>{ STATE.q = e.target.value; render(); });
$('f-status').addEventListener('change', e=>{ STATE.status = e.target.value; render(); });
$('f-cat').addEventListener('change', e=>{ STATE.cat = e.target.value; render(); });

boot();
</script>
</body>
</html>
