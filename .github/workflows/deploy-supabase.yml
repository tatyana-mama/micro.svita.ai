# =============================================================================
# Deploy Supabase Edge Functions on push to main
# =============================================================================
# Created  : TSK_005 (2026-05-17) — automate the previously-manual deploy step.
# Triggers : push to main touching supabase/functions/** OR manual dispatch.
# Auth     : reads $SUPABASE_ACCESS_TOKEN from GitHub repo secrets.
# Setup    : CEO must add the secret ONCE before this workflow can run:
#              gh secret set SUPABASE_ACCESS_TOKEN -R tatyana-mama/micro.svita.ai \
#                -b "$(security find-generic-password -a \"$USER\" -s 'supabase-pat-labs67' -w)"
# =============================================================================

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch: {}

# Avoid overlapping deploys if multiple pushes land within a few seconds.
concurrency:
  group: supabase-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ctdleobjnzniqkqomlrq
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Fail fast if secret missing
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Repo secret SUPABASE_ACCESS_TOKEN is not set."
            echo "Run: gh secret set SUPABASE_ACCESS_TOKEN -R tatyana-mama/micro.svita.ai"
            exit 1
          fi

      - name: Deploy shop-advisor
        run: |
          supabase functions deploy shop-advisor \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt

      # Detect future edge functions automatically so this workflow doesn't go
      # stale every time a new one is added. shop-advisor is deployed above
      # explicitly to keep its log line distinct; any OTHER folder under
      # supabase/functions/ gets deployed here in a loop.
      - name: Deploy any other edge functions touched in this push
        run: |
          set -euo pipefail
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            if [ "$name" = "shop-advisor" ]; then continue; fi
            if [ ! -f "$dir/index.ts" ]; then continue; fi
            echo "→ deploying $name"
            supabase functions deploy "$name" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
          done
